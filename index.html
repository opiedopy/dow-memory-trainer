<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackie Dander’s DOW Memory Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains+Mono', monospace; }
        .card-anim { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .modal { transition: opacity 0.25s ease; z-index: 100; }
        
        /* Responsive tweaks for smaller screens */
        @media (max-width: 640px) {
            .date-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-900">

    <main class="flex-grow container mx-auto px-4 py-8 max-w-2xl">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-slate-800 mb-2 tracking-tight">DOW Memory Trainer</h1>
            <p class="text-xs text-slate-400 font-mono mb-4 italic">Logic by Jackie Dander • fuzzywidget.com</p>
            <div class="flex justify-center gap-4 text-sm font-medium">
                <button onclick="exitToMenu()" class="text-blue-600 hover:underline">Trainer Home</button>
                <span class="text-slate-300">|</span>
                <button onclick="openLearningHub()" class="text-blue-600 hover:underline">Learning Hub</button>
            </div>
        </header>

        <!-- STATS BOARD -->
        <div id="stats-board" class="grid grid-cols-3 gap-4 mb-8 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div class="text-center">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Accuracy</p>
                <p id="stat-accuracy" class="text-xl font-bold text-blue-600">0%</p>
            </div>
            <div class="text-center border-x border-slate-100">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Avg Time</p>
                <p id="stat-avg" class="text-xl font-bold text-blue-600">0.0s</p>
            </div>
            <div class="text-center">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Best</p>
                <p id="stat-best" class="text-xl font-bold text-green-600">--</p>
            </div>
        </div>

        <!-- MAIN GAME CARD -->
        <div id="game-card" class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8 text-center card-anim relative overflow-hidden min-h-[420px] flex flex-col justify-center">
            
            <!-- START STATE -->
            <div id="state-start">
                <div class="mb-8 py-12 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                    <p class="text-slate-500 font-medium italic">"Master the N1-N6 logic for 1753 - 2799"</p>
                </div>
                <div class="flex flex-col gap-4">
                    <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-xl text-xl shadow-lg transform active:scale-95 transition">
                        START RANDOM TEST
                    </button>
                    <button onclick="showManualMode()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-10 rounded-xl transition">
                        MANUAL LOOKUP
                    </button>
                </div>
            </div>

            <!-- MANUAL INPUT -->
            <div id="state-manual" class="hidden text-left">
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex justify-between">
                    Manual Logic Lookup
                    <button onclick="exitToMenu()" class="text-slate-400 text-sm font-normal underline">Cancel</button>
                </h2>
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">MONTH</label>
                        <input type="number" id="manual-m" placeholder="MM" class="w-full p-3 border rounded-lg text-center font-bold text-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">DAY</label>
                        <input type="number" id="manual-d" placeholder="DD" class="w-full p-3 border rounded-lg text-center font-bold text-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">YEAR</label>
                        <input type="number" id="manual-y" placeholder="YYYY" class="w-full p-3 border rounded-lg text-center font-bold text-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <button onclick="runManualCalculation()" class="w-full bg-slate-800 hover:bg-black text-white py-3 rounded-xl font-bold mb-4 shadow-md transition">CALCULATE LOGIC</button>
                <div id="manual-error" class="hidden text-red-500 text-sm text-center font-medium"></div>
            </div>

            <!-- ACTIVE TEST -->
            <div id="state-active" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <span id="timer" class="text-2xl font-bold text-orange-500 mono">0.0s</span>
                    <button onclick="openLearningHub()" class="text-blue-500 text-xs font-bold uppercase tracking-wider hover:underline">Stuck? View Hub</button>
                </div>
                <div id="date-display" class="date-text text-5xl font-extrabold text-slate-800 mb-10 tracking-tighter">-- -- ----</div>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <button onclick="checkAnswer(0)" class="bg-slate-100 hover:bg-blue-600 hover:text-white p-3 rounded-lg font-semibold transition">Sun</button>
                    <button onclick="checkAnswer(1)" class="bg-slate-100 hover:bg-blue-600 hover:text-white p-3 rounded-lg font-semibold transition">Mon</button>
                    <button onclick="checkAnswer(2)" class="bg-slate-100 hover:bg-blue-600 hover:text-white p-3 rounded-lg font-semibold transition">Tue</button>
                    <button onclick="checkAnswer(3)" class="bg-slate-100 hover:bg-blue-600 hover:text-white p-3 rounded-lg font-semibold transition">Wed</button>
                    <button onclick="checkAnswer(4)" class="bg-slate-100 hover:bg-blue-600 hover:text-white p-3 rounded-lg font-semibold transition">Thu</button>
                    <button onclick="checkAnswer(5)" class="bg-slate-100 hover:bg-blue-600 hover:text-white p-3 rounded-lg font-semibold transition">Fri</button>
                    <button onclick="checkAnswer(6)" class="bg-slate-100 hover:bg-blue-600 hover:text-white p-3 rounded-lg font-semibold transition">Sat</button>
                    <button onclick="exitToMenu()" class="bg-slate-50 text-slate-400 p-3 rounded-lg font-semibold text-xs border border-slate-100 italic">Exit</button>
                </div>
            </div>

            <!-- RESULT BREAKDOWN -->
            <div id="state-result" class="hidden">
                <div id="feedback-icon" class="mb-2 text-5xl"></div>
                <h2 id="feedback-text" class="text-xl font-bold mb-4"></h2>
                
                <div id="breakdown-box" class="mb-6 text-left bg-slate-900 text-slate-300 p-5 rounded-2xl mono text-[12px] shadow-inner border border-slate-800">
                    <h3 class="text-blue-400 font-bold mb-3 border-b border-slate-700 pb-2 flex justify-between items-center">
                        <span>LOGIC STEPS</span>
                        <span id="result-date-label" class="text-slate-500 font-normal text-[10px]"></span>
                    </h3>
                    <div id="breakdown-content" class="space-y-1.5"></div>
                    <div id="breakdown-sum" class="mt-4 pt-3 border-t border-slate-700 text-sm font-bold text-white"></div>
                </div>
                
                <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl w-full shadow-lg transition transform active:scale-95">NEXT CHALLENGE</button>
            </div>
        </div>
    </main>

    <!-- HUB MODAL -->
    <div id="learning-modal" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeLearningHub()"></div>
        <div class="modal-container bg-white w-full max-w-lg rounded-3xl shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-lg font-bold text-slate-800">Learning Hub</h2>
                <button onclick="closeLearningHub()" class="text-slate-400 hover:text-slate-600 text-2xl font-light">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto">
                <div id="hub-menu" class="grid grid-cols-2 gap-3">
                    <button onclick="showTopic('N1')" class="p-4 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 hover:bg-blue-100 transition text-left text-sm">N1: Month</button>
                    <button onclick="showTopic('N2')" class="p-4 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 hover:bg-blue-100 transition text-left text-sm">N2: Day</button>
                    <button onclick="showTopic('N3')" class="p-4 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 hover:bg-blue-100 transition text-left text-sm">N3: Century</button>
                    <button onclick="showTopic('N4')" class="p-4 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 hover:bg-blue-100 transition text-left text-sm">N4: YY / 12</button>
                    <button onclick="showTopic('N5')" class="p-4 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 hover:bg-blue-100 transition text-left text-sm">N5: YY % 12</button>
                    <button onclick="showTopic('N6')" class="p-4 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 hover:bg-blue-100 transition text-left text-sm">N6: N5 / 4</button>
                    <button onclick="showTopic('LEAP')" class="p-4 bg-orange-50 border border-orange-100 rounded-xl font-bold text-orange-700 hover:bg-orange-100 transition text-left text-sm col-span-2">Leap Year Logic</button>
                </div>
                <div id="topic-detail" class="hidden">
                    <button onclick="backToHub()" class="text-blue-600 text-xs font-bold mb-4 inline-flex items-center hover:underline">← BACK TO LIST</button>
                    <h3 id="topic-title" class="text-xl font-extrabold text-slate-800 mb-3 border-b pb-2"></h3>
                    <div id="topic-body" class="text-sm text-slate-600 leading-relaxed space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-slate-400 text-xs font-mono italic">© Jackie Dander | fuzzywidget.com | Ohms</p>
        </div>
    </footer>

    <script>
        // CORE LOGIC DATA
        const monthValuesRef = [4, 0, 0, 3, 5, 1, 3, 6, 2, 4, 0, 2];
        const leapMonthValuesRef = [3, -1, 0, 3, 5, 1, 3, 6, 2, 4, 0, 2];
        const centuryPattern = [2, 0, 5, 3]; // Starting 1600 (Index 0), 1700 (Index 1), etc.
        const dowNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        const topicContent = {
            'N1': { title: 'N1: Month Values', body: `
                <p>Memorize these values for the month part of the equation:</p>
                <div class="grid grid-cols-1 gap-1 text-xs bg-slate-50 p-3 rounded-lg font-medium font-mono">
                    <div>Jan: 4 <span class="text-orange-600">(3 Leap Year)</span></div>
                    <div>Feb: 0 <span class="text-orange-600">(-1 Leap Year)</span></div>
                    <div>Mar: 0 (just like Nov)</div>
                    <div>Apr: 3 (just like Jul)</div>
                    <div>May: 5 (Cinco de Mayo)</div>
                    <div>Jun: 1 (The One)</div>
                    <div>Jul: 3 (just like Apr)</div>
                    <div>Aug: 6 (6 letters in August)</div>
                    <div>Sep: 2 (just like Dec)</div>
                    <div>Oct: 4 (for Halloween)</div>
                    <div>Nov: 0 (just like Mar)</div>
                    <div>Dec: 2 (just like Sep)</div>
                </div>` 
            },
            'N2': { title: 'N2: Day', body: `<p><strong>N2</strong> is simply the day of the month. Example: Oct 14th? N2 = 14.</p>` },
            'N3': { title: 'N3: Century Number', body: `
                <p>Century values cycle through 2, 0, 5, 3 every 400 years.</p>
                <div class="bg-slate-900 text-blue-400 p-4 rounded-xl font-mono text-[11px] space-y-1">
                    <div>2000-2099: 3</div>
                    <div>1900-1999: 3</div>
                    <div class="text-white border-t border-slate-700 pt-2 mt-2">Pattern:</div>
                    <div>1600, 2000, 2400 = 2 (Divisible by 400)</div>
                    <div>1700, 2100, 2500 = 0</div>
                    <div>1800, 2200, 2600 = 5</div>
                    <div>1900, 2300, 2700 = 3</div>
                </div>` 
            },
            'N4': { title: 'N4: YY / 12', body: `<p>How many times 12 goes into the last two digits of the year (YY). Example: 1936, YY=36. 36/12 = 3. N4 = 3.</p>` },
            'N5': { title: 'N5: YY % 12', body: `<p>The remainder from the N4 calculation (YY divided by 12).</p><p class="bg-slate-900 text-blue-400 p-2 rounded font-mono text-xs">2033: 33 / 12 = 2 Remainder 9. N5 = 9.</p>` },
            'N6': { title: 'N6: N5 / 4', body: `<p>How many times 4 goes into the remainder from N5.</p><p class="bg-slate-900 text-blue-400 p-2 rounded font-mono text-xs">If N5 is 9: 9 / 4 = 2. N6 = 2.</p>` },
            'LEAP': { title: 'Leap Year Check', body: `
                <p>Important for N1 (January/February):</p>
                <ul class="list-disc pl-5 mt-2 space-y-2">
                    <li>Is the year divisible by 4?</li>
                    <li>If it ends in "00", it must be divisible by 400 to be a leap year.</li>
                </ul>
                <p class="mt-4 p-3 bg-orange-50 text-orange-800 rounded-lg text-xs font-bold uppercase tracking-tight">Leap Rule: Jan=3, Feb=-1</p>` 
            }
        };

        // APP STATE
        let currentData = null, startTime = 0, timerInterval = null;
        let stats = { total: 0, correct: 0, times: [], best: Infinity };

        // CORE MATH
        function isLeapYear(y) { return (y % 4 === 0 && (y % 100 !== 0 || y % 400 === 0)); }

        function calculateLogic(m, d, y) {
            const isLeap = isLeapYear(y);
            const n1 = isLeap ? leapMonthValuesRef[m-1] : monthValuesRef[m-1];
            const n2 = d;
            
            // CC Pattern: [2, 0, 5, 3] starting 1600
            const cc = Math.floor(y / 100);
            const n3 = centuryPattern[cc % 4];
            
            const yy = y % 100;
            const n4 = Math.floor(yy / 12);
            const n5 = yy % 12;
            const n6 = Math.floor(n5 / 4);
            const sum = n1 + n2 + n3 + n4 + n5 + n6;
            
            let dow = sum % 7;
            if (dow < 0) dow += 7; // Handle Feb leap -1 sum cases
            
            return { n1, n2, n3, n4, n5, n6, sum, dow, isLeap };
        }

        // VIEW CONTROLLERS
        function hideStates() { 
            ['state-start', 'state-active', 'state-result', 'state-manual'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
        }

        function exitToMenu() { 
            clearInterval(timerInterval); 
            hideStates(); 
            document.getElementById('state-start').classList.remove('hidden'); 
        }

        function showManualMode() { 
            hideStates(); 
            document.getElementById('state-manual').classList.remove('hidden'); 
        }

        function startGame() {
            const y = Math.floor(Math.random() * (2799 - 1753 + 1)) + 1753;
            const m = Math.floor(Math.random() * 12) + 1;
            const daysInMonth = new Date(y, m, 0).getDate();
            const d = Math.floor(Math.random() * daysInMonth) + 1;
            
            currentData = { m, d, y, logic: calculateLogic(m, d, y) };
            
            hideStates();
            document.getElementById('state-active').classList.remove('hidden');
            document.getElementById('date-display').innerText = `${m}/${d}/${y}`;
            
            startTime = Date.now();
            timerInterval = setInterval(() => { 
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(1) + 's'; 
            }, 100);
        }

        function checkAnswer(userDOW) {
            clearInterval(timerInterval);
            const isCorrect = userDOW === currentData.logic.dow;
            
            stats.total++;
            if (isCorrect) {
                stats.correct++;
                const time = (Date.now() - startTime) / 1000;
                stats.times.push(time);
                if (time < stats.best) stats.best = time;
            }
            
            showResult(isCorrect);
            updateStatsUI();
        }

        function showResult(isCorrect) {
            hideStates();
            document.getElementById('state-result').classList.remove('hidden');
            document.getElementById('feedback-icon').innerText = isCorrect ? "🎯" : "❌";
            document.getElementById('feedback-text').innerText = isCorrect ? "Perfect!" : `Actually ${dowNames[currentData.logic.dow]}`;
            
            const l = currentData.logic;
            document.getElementById('result-date-label').innerText = `CALCULATED FOR: ${currentData.m}/${currentData.d}/${currentData.y}`;
            
            document.getElementById('breakdown-content').innerHTML = `
                <div class="flex justify-between"><span>N1 (Month${l.isLeap ? '*' : ''}):</span> <span class="text-blue-400 font-bold">${l.n1}</span></div>
                <div class="flex justify-between"><span>N2 (Day):</span> <span class="text-blue-400 font-bold">${l.n2}</span></div>
                <div class="flex justify-between"><span>N3 (Century):</span> <span class="text-blue-400 font-bold">${l.n3}</span></div>
                <div class="flex justify-between"><span>N4 (YY / 12):</span> <span class="text-blue-400 font-bold">${l.n4}</span></div>
                <div class="flex justify-between"><span>N5 (YY % 12):</span> <span class="text-blue-400 font-bold">${l.n5}</span></div>
                <div class="flex justify-between"><span>N6 (N5 / 4):</span> <span class="text-blue-400 font-bold">${l.n6}</span></div>
            `;
            
            document.getElementById('breakdown-sum').innerHTML = `
                SUM: ${l.sum} <span class="mx-3 text-slate-500">→</span> 
                MOD 7: <span class="text-blue-400">${l.dow} (${dowNames[l.dow].slice(0,3)})</span>
            `;
        }

        function runManualCalculation() {
            const m = parseInt(document.getElementById('manual-m').value);
            const d = parseInt(document.getElementById('manual-d').value);
            const y = parseInt(document.getElementById('manual-y').value);
            
            if (!m || !d || !y || y < 1753 || y > 2799) {
                const err = document.getElementById('manual-error');
                err.innerText = "Please enter a valid date between 1753 and 2799.";
                err.classList.remove('hidden');
                return;
            }
            
            document.getElementById('manual-error').classList.add('hidden');
            currentData = { m, d, y, logic: calculateLogic(m, d, y) };
            showResult(true); 
        }

        function updateStatsUI() {
            const acc = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
            const avg = stats.times.length === 0 ? 0 : (stats.times.reduce((a, b) => a + b, 0) / stats.times.length).toFixed(1);
            
            document.getElementById('stat-accuracy').innerText = acc + '%';
            document.getElementById('stat-avg').innerText = avg + 's';
            document.getElementById('stat-best').innerText = stats.best === Infinity ? '--' : stats.best.toFixed(1) + 's';
        }

        // HUB MODAL LOGIC
        function openLearningHub() { 
            document.getElementById('learning-modal').classList.remove('opacity-0', 'pointer-events-none'); 
            backToHub(); 
        }
        function closeLearningHub() { 
            document.getElementById('learning-modal').classList.add('opacity-0', 'pointer-events-none'); 
        }
        function showTopic(id) {
            document.getElementById('hub-menu').classList.add('hidden');
            document.getElementById('topic-detail').classList.remove('hidden');
            document.getElementById('topic-title').innerText = topicContent[id].title;
            document.getElementById('topic-body').innerHTML = topicContent[id].body;
        }
        function backToHub() { 
            document.getElementById('hub-menu').classList.remove('hidden'); 
            document.getElementById('topic-detail').classList.add('hidden'); 
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLearningHub();
        });
    </script>
</body>
</html>
